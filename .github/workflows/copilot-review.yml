name: Copilot PR Review

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 差分比較のためにフル履歴を取得

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install GitHub Copilot CLI
        env:
          # Copilot CLI の認証には COPILOT_GITHUB_TOKEN / GH_TOKEN / GITHUB_TOKEN が使える。
          GITHUB_TOKEN: ${{ github.token }}
        run: npm install -g @github/copilot

      - name: Run Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          COPILOT_GITHUB_TOKEN: ${{ env.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff

          copilot -p "Read ./pr.diff via the shell tool and write a concise markdown pull request review comment. Start the response with '## Copilot Review'. Focus on actionable risks, regressions, and missing tests. If there are no material issues, say so briefly." \
            --allow-tool 'shell(cat)' \
            > copilot-review-comment.md

      - name: Post or update Copilot Review
        if: ${{ !github.event.pull_request.head.repo.fork && env.COPILOT_GITHUB_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_ID=$(
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.user.type == "Bot" and (.body | startswith("## Copilot Review"))) | .id' \
              | head -n 1
          )

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              --field body="$(cat copilot-review-comment.md)"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body-file copilot-review-comment.md
          fi
