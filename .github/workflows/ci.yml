name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Detect backend directory
        id: backend-check
        run: |
          if [ -d backend ]; then
            echo "backend=backend" >> $GITHUB_OUTPUT
          elif [ -d server ]; then
            echo "backend=server" >> $GITHUB_OUTPUT
          else
            echo "backend=none" >> $GITHUB_OUTPUT
          fi

      - name: Detect frontend directory
        id: frontend-check
        run: |
          if [ -d frontend ]; then
            echo "frontend=frontend" >> $GITHUB_OUTPUT
          elif [ -d client ]; then
            echo "frontend=client" >> $GITHUB_OUTPUT
          else
            echo "frontend=none" >> $GITHUB_OUTPUT
          fi

      - name: Backend build and test
        if: steps.backend-check.outputs.backend != 'none'
        run: |
          set -euo pipefail
          cd ${{ steps.backend-check.outputs.backend }}
          if [ -f mvnw ]; then
            ./mvnw clean test
          elif [ -f gradlew ]; then
            ./gradlew clean test
          else
            echo "No Maven/Gradle wrapper found in backend directory. Skipping backend build/test."
          fi

      - name: Frontend lint/test
        if: steps.frontend-check.outputs.frontend != 'none'
        run: |
          set -euo pipefail
          cd ${{ steps.frontend-check.outputs.frontend }}
          npm ci
          npm run lint --if-present
          npx vitest --run --coverage --if-present || true
          npx tsc --noEmit --pretty false || true

      - name: Skip CI when no known source directories found
        if: steps.backend-check.outputs.backend == 'none' && steps.frontend-check.outputs.frontend == 'none'
        run: |
          echo "No backend/frontend (or server/client) directories found. Nothing to build/test."
